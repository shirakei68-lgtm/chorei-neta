name: Daily Neta Add

on:
  schedule:
    # 毎日 19:00 UTC = 04:00 JST に実行
    - cron: '0 19 * * *'
  workflow_dispatch:  # 手動実行も可

permissions:
  contents: write
  issues: write

jobs:
  add-neta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Dequeue and append neta
        id: dequeue
        run: python .github/scripts/dequeue_and_append.py
        env:
          LOW_THRESHOLD: '10'

      - name: Configure git
        if: steps.dequeue.outputs.added == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "chorei-bot"

      - name: Commit and push
        if: steps.dequeue.outputs.added == 'true'
        run: |
          git add neta_data.js neta_queue.json
          git commit -m "auto: add neta ${{ steps.dequeue.outputs.id }} (${{ steps.dequeue.outputs.title }})"
          git push

      - name: Open low-queue issue
        if: steps.dequeue.outputs.low == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const remaining = '${{ steps.dequeue.outputs.remaining }}';
            const today = new Date().toISOString().slice(0,10);
            const title = `ネタプール残り ${remaining} 本 (${today})`;
            const body = [
              `ネタキュー (neta_queue.json) の残りが **${remaining} 本**になりました。`,
              ``,
              `Cowork (Claude Desktop) に行き、以下と伝えてください：`,
              ``,
              `> 「ネタプールを補充して」`,
              ``,
              `私が新たな30本を生成して neta_queue.json に追加します。`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title, body,
            });
