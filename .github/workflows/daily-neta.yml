name: Daily Neta Add (Gemini)

on:
  schedule:
    # 毎日 19:00 UTC = 04:00 JST
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  add-neta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install google-generativeai

      - name: Generate and append neta
        id: gen
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python .github/scripts/gemini_add_neta.py

      - name: Configure git
        if: steps.gen.outputs.added == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "chorei-bot"

      - name: Commit and push
        if: steps.gen.outputs.added == 'true'
        run: |
          git add neta_data.js chorei-neta.html 2>/dev/null || true
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "auto(gemini): add neta ${{ steps.gen.outputs.id }} (${{ steps.gen.outputs.title }})"
          git push

      - name: Report failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0,10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily Neta Add 失敗 (${today})`,
              body: `本日のGemini生成が失敗しました。ログ: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nCoworkで白澤さんが「朝礼ネタ失敗の原因調べて」と伝えれば私が調査します。`,
            });
